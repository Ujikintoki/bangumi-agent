components:
    BlogEntry:
      properties:
        content:
          type: string
        createdAt:
          type: integer
        icon:
          type: string
        id:
          type: integer
        noreply:
          type: integer
        public:
          type: boolean
        related:
          type: integer
        replies:
          type: integer
        tags:
          items:
            type: string
          type: array
        title:
          type: string
        type:
          type: integer
        uid:
          type: integer
        updatedAt:
          type: integer
        user:
          $ref: '#/components/schemas/SlimUser'
        views:
          type: integer
      required:
        - id
        - type
        - uid
        - user
        - title
        - icon
        - content
        - tags
        - views
        - replies
        - createdAt
        - updatedAt
        - noreply
        - related
        - public
      title: BlogEntry
      type: object
    Calendar:
      additionalProperties:
        items:
          properties:
            subject:
              $ref: '#/components/schemas/SlimSubject'
            watchers:
              type: integer
          required:
            - subject
            - watchers
          type: object
        type: array
      type: object
    CalendarItem:
      properties:
        subject:
          $ref: '#/components/schemas/SlimSubject'
        watchers:
          type: integer
      required:
        - subject
        - watchers
      type: object
    Character:
      properties:
        collectedAt:
          type: integer
        collects:
          type: integer
        comment:
          type: integer
        id:
          type: integer
        images:
          $ref: '#/components/schemas/PersonImages'
        info:
          type: string
        infobox:
          $ref: '#/components/schemas/Infobox'
        lock:
          type: boolean
        name:
          type: string
        nameCN:
          type: string
        nsfw:
          type: boolean
        redirect:
          type: integer
        role:
          $ref: '#/components/schemas/CharacterType'
        summary:
          type: string
      required:
        - id
        - name
        - nameCN
        - role
        - infobox
        - info
        - summary
        - comment
        - collects
        - lock
        - redirect
        - nsfw
      title: Character
      type: object
    CharacterCast:
      properties:
        person:
          $ref: '#/components/schemas/SlimPerson'
        relation:
          $ref: '#/components/schemas/CharacterCastType'
        summary:
          type: string
      required:
        - person
        - relation
        - summary
      type: object
    CharacterCastType:
      description: |-
        Character cast relation type
          - 0 = CV
          - 1 = Dub
          - 2 = Actor
          - 3 = Chinese dub
          - 4 = Japanese dub
          - 5 = English dub
          - 6 = Korean dub
      enum:
        - 0
        - 2
        - 1
        - 3
        - 4
        - 5
        - 6
      type: integer
      x-enum-varnames:
        - CV
        - Actor
        - Dub
        - ChineseDub
        - JapaneseDub
        - EnglishDub
        - KoreanDub
      x-ms-enum:
        modelAsString: false
        name: CharacterCastType
    CharacterCreate:
      additionalProperties: false
      properties:
        img:
          description: base64 encoded raw bytes, 4mb size limit on **decoded** size
          format: byte
          type: string
        infobox:
          minLength: 1
          type: string
        name:
          minLength: 1
          type: string
        summary:
          type: string
        type:
          $ref: '#/components/schemas/CharacterType'
      required:
        - name
        - infobox
        - summary
        - type
      type: object
    CharacterEdit:
      additionalProperties: false
      properties:
        infobox:
          minLength: 1
          type: string
        name:
          minLength: 1
          type: string
        summary:
          type: string
      required:
        - name
        - infobox
        - summary
      type: object
    CharacterRelation:
      properties:
        character:
          $ref: '#/components/schemas/SlimCharacter'
        comment:
          type: string
        ended:
          type: boolean
        relation:
          $ref: '#/components/schemas/PersonRelationType'
        spoiler:
          type: boolean
      required:
        - character
        - relation
        - spoiler
        - ended
        - comment
      type: object
    CharacterRevisionWikiInfo:
      properties:
        extra:
          properties:
            img:
              type: string
          type: object
        infobox:
          type: string
        name:
          type: string
        summary:
          type: string
      required:
        - name
        - infobox
        - summary
        - extra
      type: object
    CharacterSearchFilter:
      properties:
        nsfw:
          description: |-
            无权限的用户会直接忽略此字段，不会返回 R18 条目。
            `null` 或者 `true` 会返回包含 R18 的所有搜索结果。
            `false` 只会返回非 R18 条目。
          type: boolean
      type: object
    CharacterSubject:
      properties:
        casts:
          items:
            $ref: '#/components/schemas/CharacterCast'
          type: array
        subject:
          $ref: '#/components/schemas/SlimSubject'
        type:
          type: integer
      required:
        - subject
        - casts
        - type
      type: object
    CharacterSubjectRelation:
      properties:
        subject:
          $ref: '#/components/schemas/SlimSubject'
        type:
          type: integer
      required:
        - subject
        - type
      type: object
    CharacterSubjectRevisionWikiInfo:
      items:
        properties:
          order:
            type: integer
          subject:
            properties:
              id:
                type: integer
              name:
                type: string
              nameCN:
                type: string
              typeID:
                $ref: '#/components/schemas/SubjectType'
            required:
              - id
              - typeID
              - name
              - nameCN
            type: object
          type:
            type: integer
        required:
          - subject
          - type
          - order
        type: object
      type: array
    CharacterType:
      description: |-
        角色类型
          - 1 = 角色
          - 2 = 机体
          - 3 = 舰船
          - 4 = 组织机构
      enum:
        - 1
        - 2
        - 3
        - 4
      type: integer
      x-enum-varnames:
        - Crt
        - Mecha
        - Vessel
        - Org
      x-ms-enum:
        modelAsString: false
        name: CharacterType
    CharacterWikiInfo:
      properties:
        id:
          type: integer
        infobox:
          type: string
        locked:
          type: boolean
        name:
          type: string
        redirect:
          type: integer
        summary:
          type: string
      required:
        - id
        - name
        - infobox
        - summary
        - locked
        - redirect
      type: object
    CollectSubject:
      properties:
        comment:
          description: 评价
          type: string
        private:
          description: 仅自己可见
          type: boolean
        progress:
          description: |-
            是否自动完成条目进度，仅在 `type` 为 `看过` 时有效，并且不会产生对应的时间线记录：
                      - 书籍条目会检查总的话数和卷数，并更新收藏进度到最新;
                      - 动画和三次元会标记所有正片章节为已完成，并同时更新收藏进度
          type: boolean
        rate:
          description: 评分，0 表示删除评分
          maximum: 10
          minimum: 0
          type: integer
        tags:
          items:
            description: 标签, 不能包含空格
            type: string
          type: array
        type:
          $ref: '#/components/schemas/CollectionType'
      type: object
    CollectionType:
      description: |-
        条目收藏状态
          - 1 = 想看
          - 2 = 看过
          - 3 = 在看
          - 4 = 搁置
          - 5 = 抛弃
      enum:
        - 1
        - 2
        - 3
        - 4
        - 5
      type: integer
      x-enum-varnames:
        - Wish
        - Collect
        - Doing
        - OnHold
        - Dropped
      x-ms-enum:
        modelAsString: false
        name: CollectionType
    Comment:
      allOf:
        - properties:
            content:
              type: string
            createdAt:
              type: integer
            creatorID:
              type: integer
            id:
              type: integer
            mainID:
              type: integer
            reactions:
              items:
                $ref: '#/components/schemas/Reaction'
              type: array
            relatedID:
              type: integer
            relatedPhotoID:
              type: integer
            state:
              type: integer
            user:
              $ref: '#/components/schemas/SlimUser'
          required:
            - id
            - mainID
            - creatorID
            - relatedID
            - createdAt
            - content
            - state
          type: object
        - properties:
            replies:
              items:
                $ref: '#/components/schemas/CommentBase'
              type: array
          required:
            - replies
          type: object
    CommentBase:
      properties:
        content:
          type: string
        createdAt:
          type: integer
        creatorID:
          type: integer
        id:
          type: integer
        mainID:
          type: integer
        reactions:
          items:
            $ref: '#/components/schemas/Reaction'
          type: array
        relatedID:
          type: integer
        relatedPhotoID:
          type: integer
        state:
          type: integer
        user:
          $ref: '#/components/schemas/SlimUser'
      required:
        - id
        - mainID
        - creatorID
        - relatedID
        - createdAt
        - content
        - state
      type: object
    CreateContent:
      properties:
        content:
          minLength: 1
          type: string
      required:
        - content
      type: object
    CreateIndex:
      properties:
        desc:
          description: 目录描述
          type: string
        private:
          description: 仅自己可见
          type: boolean
        title:
          description: 目录标题
          maxLength: 80
          minLength: 1
          type: string
      required:
        - title
        - desc
      title: CreateIndex
      type: object
    CreateIndexRelated:
      properties:
        award:
          type: string
        cat:
          $ref: '#/components/schemas/IndexRelatedCategory'
        comment:
          type: string
        order:
          type: integer
        sid:
          type: integer
      required:
        - cat
        - sid
      title: CreateIndexRelated
      type: object
    CreateReply:
      properties:
        content:
          minLength: 1
          type: string
        replyTo:
          default: 0
          description: 被回复的回复 ID, `0` 代表发送顶层回复
          type: integer
      required:
        - content
      type: object
    CreateReport:
      properties:
        comment:
          description: 举报说明（可选）
          maxLength: 2000
          type: string
        id:
          description: 被举报对象的 ID
          minimum: 1
          type: integer
        type:
          $ref: '#/components/schemas/ReportType'
        value:
          $ref: '#/components/schemas/ReportReason'
      required:
        - type
        - id
        - value
      title: CreateReport
      type: object
    CreateTopic:
      properties:
        content:
          description: bbcode
          minLength: 1
          type: string
        title:
          minLength: 1
          type: string
      required:
        - title
        - content
      type: object
    Episode:
      properties:
        airdate:
          type: string
        collection:
          properties:
            status:
              $ref: '#/components/schemas/EpisodeCollectionStatus'
            updatedAt:
              type: integer
          required:
            - status
          type: object
        comment:
          type: integer
        desc:
          type: string
        disc:
          type: integer
        duration:
          type: string
        id:
          type: integer
        name:
          type: string
        nameCN:
          type: string
        sort:
          type: number
        subject:
          $ref: '#/components/schemas/SlimSubject'
        subjectID:
          type: integer
        type:
          $ref: '#/components/schemas/EpisodeType'
      required:
        - id
        - subjectID
        - sort
        - type
        - disc
        - name
        - nameCN
        - duration
        - airdate
        - comment
        - desc
      title: Episode
      type: object
    EpisodeCollectionStatus:
      description: |-
        章节收藏状态
          - 0 = 撤消/删除
          - 1 = 想看
          - 2 = 看过
          - 3 = 抛弃
      enum:
        - 0
        - 1
        - 2
        - 3
      type: integer
      x-enum-varnames:
        - None
        - Wish
        - Done
        - Dropped
      x-ms-enum:
        modelAsString: false
        name: EpisodeCollectionStatus
    EpisodeType:
      description: |-
        话数类型
          - 0 = 本篇
          - 1 = 特别篇
          - 2 = OP
          - 3 = ED
          - 4 = 预告/宣传/广告
          - 5 = MAD
          - 6 = 其他
      enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
      type: integer
      x-enum-varnames:
        - Normal
        - Special
        - OP
        - ED
        - Pre
        - MAD
        - Other
      x-ms-enum:
        modelAsString: false
        name: EpisodeType
    EpisodeWikiInfo:
      properties:
        date:
          description: YYYY-MM-DD
          example: '2022-02-02'
          pattern: ^\d{4}-\d{2}-\d{2}$
          type: string
        disc:
          type: number
        duration:
          example: '24:53'
          type: string
        ep:
          type: number
        id:
          type: integer
        name:
          type: string
        nameCN:
          type: string
        subjectID:
          type: integer
        summary:
          type: string
        type:
          $ref: '#/components/schemas/EpisodeType'
      required:
        - id
        - subjectID
        - name
        - nameCN
        - type
        - ep
        - duration
        - summary
      type: object
    EpsisodesEdit:
      properties:
        commitMessage:
          type: string
        episodes:
          items:
            properties:
              date:
                description: YYYY-MM-DD
                example: '2022-02-02'
                pattern: ^\d{4}-\d{2}-\d{2}$
                type: string
              disc:
                type: number
              duration:
                example: '24:53'
                type: string
              ep:
                type: number
              id:
                type: integer
              name:
                type: string
              nameCN:
                type: string
              summary:
                type: string
              type:
                $ref: '#/components/schemas/EpisodeType'
            required:
              - id
            type: object
          type: array
        expectedRevision:
          items:
            properties:
              date:
                type: string
              duration:
                type: string
              name:
                type: string
              nameCN:
                type: string
              summary:
                type: string
            type: object
          type: array
      required:
        - commitMessage
        - episodes
      type: object
    EpsisodesNew:
      properties:
        episodes:
          items:
            properties:
              date:
                description: YYYY-MM-DD
                example: '2022-02-02'
                pattern: ^\d{4}-\d{2}-\d{2}$
                type: string
              disc:
                type: number
              duration:
                example: '24:53'
                type: string
              ep:
                type: number
              name:
                type: string
              nameCN:
                type: string
              summary:
                type: string
              type:
                $ref: '#/components/schemas/EpisodeType'
            required:
              - ep
            type: object
          type: array
      required:
        - episodes
      type: object
    ErrorResponse:
      description: default error response type
      properties:
        code:
          type: string
        error:
          type: string
        message:
          type: string
        statusCode:
          type: integer
      required:
        - code
        - error
        - message
        - statusCode
      type: object
    FilterMode:
      description: |-
        过滤模式
          - all = 全站
          - friends = 好友
      enum:
        - all
        - friends
      type: string
      x-enum-varnames:
        - All
        - Friends
      x-ms-enum:
        modelAsString: true
        name: FilterMode
    Friend:
      properties:
        createdAt:
          type: integer
        description:
          type: string
        grade:
          type: integer
        user:
          $ref: '#/components/schemas/SlimUser'
      required:
        - user
        - grade
        - createdAt
        - description
      title: Friend
      type: object
    Group:
      properties:
        accessible:
          type: boolean
        cat:
          type: integer
        createdAt:
          type: integer
        creator:
          $ref: '#/components/schemas/SlimUser'
        creatorID:
          type: integer
        description:
          type: string
        icon:
          $ref: '#/components/schemas/Avatar'
        id:
          type: integer
        members:
          type: integer
        membership:
          $ref: '#/components/schemas/GroupMember'
        name:
          type: string
        nsfw:
          type: boolean
        posts:
          type: integer
        title:
          type: string
        topics:
          type: integer
      required:
        - id
        - cat
        - name
        - nsfw
        - title
        - icon
        - creatorID
        - topics
        - posts
        - members
        - description
        - accessible
        - createdAt
      title: Group
      type: object
    GroupFilterMode:
      description: |-
        小组过滤模式
          - all = 所有小组
          - joined = 我加入的小组
          - managed = 我管理的小组
      enum:
        - all
        - joined
        - managed
      type: string
      x-enum-varnames:
        - All
        - Joined
        - Managed
      x-ms-enum:
        modelAsString: true
        name: GroupFilterMode
    GroupMember:
      properties:
        joinedAt:
          type: integer
        role:
          $ref: '#/components/schemas/GroupMemberRole'
        uid:
          type: integer
        user:
          $ref: '#/components/schemas/SlimUser'
      required:
        - uid
        - role
        - joinedAt
      title: GroupMember
      type: object
    GroupMemberRole:
      description: |-
        小组成员角色
          - -2 = 访客
          - -1 = 游客
          - 0 = 小组成员
          - 1 = 小组长
          - 2 = 小组管理员
          - 3 = 禁言成员
      enum:
        - -2
        - -1
        - 0
        - 1
        - 2
        - 3
      type: integer
      x-enum-varnames:
        - Visitor
        - Guest
        - Member
        - Creator
        - Moderator
        - Blocked
      x-ms-enum:
        modelAsString: false
        name: GroupMemberRole
    GroupSort:
      default: created
      description: |-
        小组排序方式
          - posts = 帖子数
          - topics = 主题数
          - members = 成员数
          - created = 创建时间
          - updated = 最新讨论
      enum:
        - posts
        - topics
        - members
        - created
        - updated
      type: string
    GroupTopic:
      allOf:
        - $ref: '#/components/schemas/Topic'
        - properties:
            group:
              $ref: '#/components/schemas/SlimGroup'
            replies:
              items:
                $ref: '#/components/schemas/Reply'
              type: array
          required:
            - group
            - replies
          type: object
      title: GroupTopic
    GroupTopicFilterMode:
      description: |-
        小组话题过滤模式
          - all = 全站
          - joined = 已加入
          - created = 我创建的
          - replied = 我回复的
      enum:
        - all
        - joined
        - created
        - replied
      type: string
      x-enum-varnames:
        - All
        - Joined
        - Created
        - Replied
      x-ms-enum:
        modelAsString: true
        name: GroupTopicFilterMode
    Index:
      properties:
        award:
          type: integer
        collectedAt:
          type: integer
        collects:
          type: integer
        createdAt:
          type: integer
        desc:
          type: string
        id:
          type: integer
        private:
          type: boolean
        replies:
          type: integer
        stats:
          $ref: '#/components/schemas/IndexStats'
        title:
          type: string
        total:
          type: integer
        type:
          $ref: '#/components/schemas/IndexType'
        uid:
          type: integer
        updatedAt:
          type: integer
        user:
          $ref: '#/components/schemas/SlimUser'
      required:
        - id
        - uid
        - type
        - title
        - desc
        - private
        - total
        - replies
        - collects
        - stats
        - award
        - createdAt
        - updatedAt
      title: Index
      type: object
    IndexRelated:
      properties:
        award:
          type: string
        blog:
          $ref: '#/components/schemas/SlimBlogEntry'
        cat:
          $ref: '#/components/schemas/IndexRelatedCategory'
        character:
          $ref: '#/components/schemas/SlimCharacter'
        comment:
          type: string
        createdAt:
          type: integer
        episode:
          $ref: '#/components/schemas/Episode'
        groupTopic:
          $ref: '#/components/schemas/GroupTopic'
        id:
          type: integer
        order:
          type: integer
        person:
          $ref: '#/components/schemas/SlimPerson'
        rid:
          type: integer
        sid:
          type: integer
        subject:
          $ref: '#/components/schemas/SlimSubject'
        subjectTopic:
          $ref: '#/components/schemas/SubjectTopic'
        type:
          type: integer
      required:
        - id
        - cat
        - rid
        - type
        - sid
        - order
        - comment
        - award
        - createdAt
      title: IndexRelated
      type: object
    IndexRelatedCategory:
      description: |-
        目录关联类型
          - 0 = 条目
          - 1 = 角色
          - 2 = 人物
          - 3 = 章节
          - 4 = 日志
          - 5 = 小组话题
          - 6 = 条目讨论
      enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
      type: integer
      x-enum-varnames:
        - Subject
        - Character
        - Person
        - Episode
        - Blog
        - GroupTopic
        - SubjectTopic
      x-ms-enum:
        modelAsString: false
        name: IndexRelatedCategory
    IndexStats:
      properties:
        blog:
          type: integer
        character:
          type: integer
        episode:
          type: integer
        groupTopic:
          type: integer
        person:
          type: integer
        subject:
          properties:
            anime:
              type: integer
            book:
              type: integer
            game:
              type: integer
            music:
              type: integer
            real:
              type: integer
          type: object
        subjectTopic:
          type: integer
      required:
        - subject
      title: IndexStats
      type: object
    IndexType:
      description: |-
        目录类型
          - 0 = 用户
          - 1 = 公共
          - 2 = TBA
      enum:
        - 0
        - 1
        - 2
      type: integer
      x-enum-varnames:
        - User
        - Public
        - Award
      x-ms-enum:
        modelAsString: false
        name: IndexType
    Infobox:
      items:
        properties:
          key:
            type: string
          values:
            items:
              properties:
                k:
                  type: string
                v:
                  type: string
              required:
                - v
              title: InfoboxValue
              type: object
            type: array
        required:
          - key
          - values
        title: InfoboxItem
        type: object
      title: Infobox
      type: array
    InfoboxItem:
      properties:
        key:
          type: string
        values:
          items:
            properties:
              k:
                type: string
              v:
                type: string
            required:
              - v
            title: InfoboxValue
            type: object
          type: array
      required:
        - key
        - values
      title: InfoboxItem
      type: object
    InfoboxValue:
      properties:
        k:
          type: string
        v:
          type: string
